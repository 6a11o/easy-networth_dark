<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sleek background with subtle blur effect -->
  <rect width="512" height="512" rx="256" fill="#0F1119" />
  
  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="496" height="496" rx="248" fill="url(#subtle_glow)" opacity="0.6" />
  
  <!-- Border element inspired by Sign In button -->
  <rect x="4" y="4" width="504" height="504" rx="252" stroke="url(#border_gradient)" stroke-width="2" stroke-opacity="0.6" />
  
  <!-- Minimalist graph line (arrow pointing up) -->
  <path d="M166 346 L256 166 L346 346" 
        stroke="url(#line_gradient)" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  
  <!-- Horizontal line representing baseline -->
  <path d="M166 346 L346 346" 
        stroke="url(#line_gradient)" 
        stroke-width="10" 
        stroke-linecap="round" />
  
  <!-- Subtle blur overlay effect (like Sign In button hover) -->
  <circle cx="256" cy="256" r="120" fill="url(#blur_overlay)" opacity="0.07" filter="blur(40px)" />
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="border_gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33C3F0" stop-opacity="0.6" />
      <stop offset="1" stop-color="#66EACE" stop-opacity="0.6" />
    </linearGradient>
    
    <linearGradient id="line_gradient" x1="166" y1="256" x2="346" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33C3F0" />
      <stop offset="1" stop-color="#66EACE" />
    </linearGradient>
    
    <linearGradient id="blur_overlay" x1="136" y1="136" x2="376" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33C3F0" />
      <stop offset="1" stop-color="#66EACE" />
    </linearGradient>
    
    <radialGradient id="subtle_glow" cx="256" cy="256" r="248" gradientUnits="userSpaceOnUse">
      <stop offset="0.7" stop-color="#0F1119" stop-opacity="0" />
      <stop offset="1" stop-color="#33C3F0" stop-opacity="0.08" />
    </radialGradient>
  </defs>
</svg>
