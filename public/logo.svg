
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main circular background with tech-inspired gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#tech_gradient)" />
  
  <!-- Abstract graph/chart line representing financial growth -->
  <path d="M128 320 L192 256 L256 288 L320 224 L384 160" 
        stroke="white" 
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none" />
  
  <!-- Data points -->
  <circle cx="192" cy="256" r="10" fill="white" />
  <circle cx="256" cy="288" r="10" fill="white" />
  <circle cx="320" cy="224" r="10" fill="white" />
  
  <!-- Tech circuit pattern overlay -->
  <path d="M128 352 H384" stroke="white" stroke-width="6" stroke-opacity="0.6" stroke-linecap="round" />
  <path d="M256 128 L256 384" stroke="white" stroke-width="6" stroke-opacity="0.6" stroke-linecap="round" />
  <path d="M128 288 L192 288" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round" />
  <path d="M320 288 L384 288" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round" />
  <path d="M224 192 L224 256" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round" />
  <path d="M288 224 L288 320" stroke="white" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round" />
  
  <!-- Inner glow effect -->
  <circle cx="256" cy="256" r="160" fill="url(#inner_glow)" fill-opacity="0.15" />
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="tech_gradient" x1="60" y1="60" x2="452" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#33C3F0" />
      <stop offset="1" stop-color="#66EACE" />
    </linearGradient>
    
    <radialGradient id="inner_glow" cx="256" cy="256" r="160" gradientUnits="userSpaceOnUse">
      <stop offset="0.7" stop-color="white" stop-opacity="0.3" />
      <stop offset="1" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
