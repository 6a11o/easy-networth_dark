
<html>
<head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      background: #0F1119;
      padding: 40px;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .logo-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 40px;
    }
    .logo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo-item img {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 8px;
    }
    .logo-item img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(51, 195, 240, 0.3);
    }
    h1 {
      background: linear-gradient(90deg, #33C3F0, #66EACE);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0;
    }
    p {
      opacity: 0.7;
      max-width: 600px;
      text-align: center;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <h1>Logo Design Options</h1>
  <p>Four modern, tech-oriented finance tracking logo options with minimalist design aesthetics that match the app's UI</p>
  
  <div class="logo-container">
    <div class="logo-item">
      <img src="logo.svg" width="200" height="200" alt="Main Logo">
      <span>Main Logo</span>
    </div>
    <div class="logo-item">
      <img src="logo_alt1.svg" width="200" height="200" alt="Alternative 1">
      <span>Alternative 1</span>
    </div>
    <div class="logo-item">
      <img src="logo_alt2.svg" width="200" height="200" alt="Alternative 2">
      <span>Alternative 2</span>
    </div>
    <div class="logo-item">
      <img src="logo_alt3.svg" width="200" height="200" alt="Alternative 3">
      <span>Alternative 3</span>
    </div>
  </div>
</body>
</html>
